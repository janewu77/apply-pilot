<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .tile {
    width: 440px; height: 280px; overflow: hidden;
    background: #0f0f1a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }

  .bg-glow {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.22) 0%, transparent 70%);
    top: -80px; right: -60px;
  }
  .bg-glow2 {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.14) 0%, transparent 70%);
    bottom: -60px; left: -40px;
  }

  .inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 36px;
    width: 100%;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    overflow: hidden;
  }
  .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
  .logo-name {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .tagline {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin-bottom: 14px;
  }
  .tagline .grad {
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8;
  }
</style>
</head>
<body>
  <div class="tile">
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="inner">
    <div class="logo-row">
      <div class="logo-icon"><img src="../../src/icons/icon128.png" alt="Apply Pilot"></div>
      <div class="logo-name">Apply Pilot</div>
    </div>
    <div class="tagline">Fill job forms<br><span class="grad">in one click.</span></div>
    <div class="sub">Save your profile once. Auto-fill any application form.</div>
    <div class="pills">
      <div class="pill">⚡ Keyword match</div>
      <div class="pill">🤖 AI fill</div>
      <div class="pill">🔒 100% local</div>
    </div>
  </div>
  </div>
</body>
</html>
