<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    .header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header .version {
      font-size: 11px;
      opacity: 0.7;
    }

    .content {
      padding: 16px 20px;
    }

    .status-box {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
    .status-box .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .status-box .stat-value {
      color: #f8fafc;
      font-weight: 500;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover { background: #2563eb; }

    .btn-success {
      background: #22c55e;
      color: white;
    }
    .btn-success:hover { background: #16a34a; }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    .btn-secondary:hover { background: #475569; }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }
    .footer a:hover { text-decoration: underline; }

    #message {
      font-size: 12px;
      color: #fbbf24;
      margin-top: 8px;
      min-height: 16px;
    }

    .verify-hint {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(251, 191, 36, 0.12);
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.5;
      color: #fde68a;
    }

    /* Language toggle */
    .lang-toggle {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .lang-btn {
      background: none;
      border: 1px solid #475569;
      border-radius: 4px;
      color: #94a3b8;
      font-size: 11px;
      padding: 2px 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .lang-btn:hover { border-color: #60a5fa; color: #60a5fa; }
    .lang-btn.active { border-color: #3b82f6; color: #60a5fa; background: rgba(59,130,246,0.15); }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" style="width:28px;height:28px;border-radius:6px;">
    <div>
      <h1>Apply Pilot</h1>
      <span class="version"></span>
    </div>
  </div>

  <div class="content">
    <div class="status-box" id="statusBox">
      <div class="stat-row">
        <span data-i18n="popup.stat.fieldsDetected">Fields Detected</span>
        <span class="stat-value" id="totalFields">-</span>
      </div>
      <div class="stat-row">
        <span data-i18n="popup.stat.matched">Matched</span>
        <span class="stat-value" id="matchedFields">-</span>
      </div>
      <div class="stat-row">
        <span data-i18n="popup.stat.filled">Filled</span>
        <span class="stat-value" id="filledFields">-</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btnScan">
        <span>🔍</span> <span data-i18n="popup.btn.scan">Scan &amp; Match Form</span>
      </button>
      <button class="btn btn-success" id="btnFillAll">
        <span>✏️</span> <span data-i18n="popup.btn.fillAll">Fill All Matched Fields</span>
      </button>
      <button class="btn btn-secondary" id="btnClear">
        <span>🧹</span> <span data-i18n="popup.btn.clear">Clear Overlays</span>
      </button>
    </div>

    <div id="message"></div>

    <p class="verify-hint">
      <strong data-i18n="popup.hint.strong">Before submitting, verify:</strong>
      <span data-i18n="popup.hint.body"> Some sites (React/Vue etc.) may show filled text but still report empty. After auto-fill, click or Tab through important fields to confirm no errors before submitting.</span>
    </p>
  </div>

  <div class="footer">
    <a id="openSettings" data-i18n="popup.footer.settings">⚙️ Profile Settings</a>
    <div class="lang-toggle">
      <button class="lang-btn active" id="langEn">EN</button>
      <button class="lang-btn" id="langZh">中</button>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
