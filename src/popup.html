<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    .header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header .version {
      font-size: 11px;
      opacity: 0.7;
    }

    .content {
      padding: 16px 20px;
    }

    .status-box {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
    .status-box .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .status-box .stat-value {
      color: #f8fafc;
      font-weight: 500;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover { background: #2563eb; }

    .btn-success {
      background: #22c55e;
      color: white;
    }
    .btn-success:hover { background: #16a34a; }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    .btn-secondary:hover { background: #475569; }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }
    .footer a:hover { text-decoration: underline; }

    .shortcut {
      background: #334155;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      color: #94a3b8;
    }

    #message {
      font-size: 12px;
      color: #fbbf24;
      margin-top: 8px;
      min-height: 16px;
    }

    .verify-hint {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(251, 191, 36, 0.12);
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.5;
      color: #fde68a;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size: 24px;">🚀</span>
    <div>
      <h1>Apply Pilot</h1>
      <span class="version">v1.1.2</span>
    </div>
  </div>

  <div class="content">
    <div class="status-box" id="statusBox">
      <div class="stat-row">
        <span>检测到字段</span>
        <span class="stat-value" id="totalFields">-</span>
      </div>
      <div class="stat-row">
        <span>已匹配</span>
        <span class="stat-value" id="matchedFields">-</span>
      </div>
      <div class="stat-row">
        <span>已填充</span>
        <span class="stat-value" id="filledFields">-</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btnScan">
        <span>🔍</span> 扫描并匹配表单
      </button>
      <button class="btn btn-success" id="btnFillAll">
        <span>✏️</span> 填充全部匹配字段
      </button>
      <button class="btn btn-secondary" id="btnClear">
        <span>🧹</span> 清除覆盖层
      </button>
    </div>

    <div id="message"></div>

    <p class="verify-hint">
      <strong>提交前请自检：</strong>部分网站（React / Vue 等）可能「框里有字」仍判未填。自动填充后请在重要栏位里点一下或 Tab 离开，确认无红字再递交。
    </p>
  </div>

  <div class="footer">
    <a id="openSettings">⚙️ 档案设置</a>
    <span class="shortcut">Alt+F 快捷扫描</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
